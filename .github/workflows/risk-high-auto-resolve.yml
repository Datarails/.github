# ============================================================================
# RISK ANALYSIS RE-TRIGGER
#
# This workflow lives in the Datarails/.github org repo and runs org-wide.
# It handles two scenarios where the risk analysis check needs to re-run
# but the org ruleset won't trigger it:
#
# 1. APPROVALS: When a Risk:High PR reaches 2 approvals, re-run the check.
# 2. LABEL DOWNGRADE: When Risk:High is removed (downgraded to Medium/Low),
#    re-run the check so it passes with the lower risk level.
#
# WHY: GitHub org rulesets (required workflows) only trigger on push-related
# pull_request events (opened, synchronize). They do NOT trigger on
# pull_request_review or label changes.
# ============================================================================

name: Risk Analysis Re-trigger

on:
  pull_request_review:
    types: [submitted, dismissed]
  pull_request:
    types: [labeled, unlabeled]

jobs:
  # ---- Scenario 1: Re-run on 2 approvals for Risk:High ----
  approval-resolve:
    if: >-
      github.event_name == 'pull_request_review' &&
      (github.event.review.state == 'approved' || github.event.action == 'dismissed')
    runs-on: ubuntu-latest
    permissions:
      actions: write
      pull-requests: read
      issues: read
      checks: read

    steps:
      - name: Re-run risk analysis if Risk:High + 2 approvals
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const REQUIRED_APPROVALS = 2;

            // Check if PR has Risk:High label
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: prNumber
            });
            if (!labels.some(l => l.name === 'Risk:High')) {
              core.info('PR does not have Risk:High label — skipping');
              return;
            }

            // Count approvals (latest review per user, paginated)
            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              { owner, repo, pull_number: prNumber, per_page: 100 }
            );
            const latestByUser = new Map();
            for (const review of reviews) {
              const userId = review.user?.id;
              if (!userId) continue;
              const existing = latestByUser.get(userId);
              if (!existing) {
                latestByUser.set(userId, review);
                continue;
              }
              const currentTime = review.submitted_at ? Date.parse(review.submitted_at) : 0;
              const existingTime = existing.submitted_at ? Date.parse(existing.submitted_at) : 0;
              if (currentTime > existingTime) {
                latestByUser.set(userId, review);
              }
            }
            const approvalCount = [...latestByUser.values()].filter(r => r.state === 'APPROVED').length;
            core.info(`Risk:High PR — ${approvalCount}/${REQUIRED_APPROVALS} approvals`);

            if (approvalCount < REQUIRED_APPROVALS) {
              core.info('Not enough approvals yet — skipping');
              return;
            }

            // Find and re-run the failed risk analysis check
            const headSha = context.payload.pull_request.head.sha;
            const { data: checkRuns } = await github.rest.checks.listForRef({
              owner, repo, ref: headSha, filter: 'latest'
            });
            const riskCheck = checkRuns.check_runs.find(
              c => c.name === 'risk-analysis' && c.conclusion === 'failure'
            );
            if (!riskCheck) {
              core.info('No failed risk-analysis check found — nothing to re-run');
              return;
            }

            const runMatch = (riskCheck.details_url || '').match(/\/actions\/runs\/(\d+)/);
            if (!runMatch) {
              core.warning('Could not extract run ID from check details URL');
              return;
            }

            const runId = parseInt(runMatch[1]);
            core.info(`Re-running workflow run ${runId}`);
            await github.rest.actions.reRunWorkflow({ owner, repo, run_id: runId });
            core.info('Risk analysis re-run triggered');

  # ---- Scenario 2: Re-run on label downgrade from Risk:High ----
  label-resolve:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action == 'labeled' &&
      (github.event.label.name == 'Risk:Low' || github.event.label.name == 'Risk:Medium')
    runs-on: ubuntu-latest
    permissions:
      actions: write
      pull-requests: read
      issues: read
      checks: read

    steps:
      - name: Re-run risk analysis after label downgrade
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;

            // Find and re-run the failed risk analysis check
            const headSha = context.payload.pull_request.head.sha;
            const { data: checkRuns } = await github.rest.checks.listForRef({
              owner, repo, ref: headSha, filter: 'latest'
            });
            const riskCheck = checkRuns.check_runs.find(
              c => c.name === 'risk-analysis' && c.conclusion === 'failure'
            );
            if (!riskCheck) {
              core.info('No failed risk-analysis check found — nothing to re-run');
              return;
            }

            const runMatch = (riskCheck.details_url || '').match(/\/actions\/runs\/(\d+)/);
            if (!runMatch) {
              core.warning('Could not extract run ID from check details URL');
              return;
            }

            const runId = parseInt(runMatch[1]);
            core.info(`Label downgrade detected — re-running workflow run ${runId}`);
            await github.rest.actions.reRunWorkflow({ owner, repo, run_id: runId });
            core.info('Risk analysis re-run triggered');
