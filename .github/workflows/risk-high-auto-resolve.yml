# ============================================================================
# RISK:HIGH AUTO-RESOLVE ON APPROVALS
#
# This workflow is intended to live in the Datarails/.github org repo at:
#   .github/workflows/risk-high-auto-resolve.yml
#
# It runs org-wide on every PR approval (or dismissal) and checks whether a
# Risk:High PR has reached 2 reviewer approvals. If so, it adds a temporary
# label to trigger the org ruleset re-run of shared-risk-analysis, which will
# then find the approvals and pass the check.
#
# On dismissal, it re-triggers the check so the risk gate stays accurate
# when approvals are removed.
#
# WHY: GitHub org rulesets (required workflows) only trigger on pull_request
# events, not pull_request_review. So approvals alone never re-trigger the
# risk analysis check. This workflow bridges that gap.
#
# SETUP: Copy this file to Datarails/.github/.github/workflows/
# ============================================================================

name: Risk:High Auto-Resolve

on:
  pull_request_review:
    types: [submitted, dismissed]

jobs:
  auto-resolve:
    if: github.event.review.state == 'approved' || github.event.action == 'dismissed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      issues: write

    steps:
      - name: Check Risk:High and resolve on 2 approvals
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const REQUIRED_APPROVALS = 2;

            // Check if PR has Risk:High label
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: prNumber
            });
            const hasRiskHigh = labels.some(l => l.name === 'Risk:High');
            if (!hasRiskHigh) {
              core.info('PR does not have Risk:High label — skipping');
              return;
            }

            // Count approvals (latest review per user, paginated)
            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              { owner, repo, pull_number: prNumber, per_page: 100 }
            );
            const latestByUser = new Map();
            for (const review of reviews) {
              const userId = review.user?.id;
              if (!userId) continue;
              const existing = latestByUser.get(userId);
              if (!existing) {
                latestByUser.set(userId, review);
                continue;
              }
              const currentTime = review.submitted_at ? Date.parse(review.submitted_at) : 0;
              const existingTime = existing.submitted_at ? Date.parse(existing.submitted_at) : 0;
              if (currentTime > existingTime) {
                latestByUser.set(userId, review);
              }
            }
            const approvalCount = [...latestByUser.values()].filter(r => r.state === 'APPROVED').length;

            core.info(`Risk:High PR — ${approvalCount}/${REQUIRED_APPROVALS} approvals`);

            if (approvalCount < REQUIRED_APPROVALS) {
              core.info('Not enough approvals yet — skipping');
              return;
            }

            // Add and remove a temporary label to trigger ruleset re-run
            // This avoids removing Risk:High (which would cause "Missing Label" noise)
            const triggerLabel = 'risk-recheck';
            core.info('Adding temporary label to trigger risk analysis re-run');
            try {
              await github.rest.issues.addLabels({
                owner, repo, issue_number: prNumber, labels: [triggerLabel]
              });
              // Small delay to ensure the labeled event fires
              await new Promise(resolve => setTimeout(resolve, 1000));
              await github.rest.issues.removeLabel({
                owner, repo, issue_number: prNumber, name: triggerLabel
              });
            } catch (e) {
              core.warning(`Label toggle failed: ${e.message}`);
            }
            core.info('Trigger label toggled — risk analysis will re-run and find approvals');
